name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: MCP protocol conformance (tools/list)
        run: |
          printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"0.0.1"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | node dist/index.js \
            | tee /tmp/mcp.out
          grep -q '"name":"ping"' /tmp/mcp.out
          grep -q '"name":"list_flags"' /tmp/mcp.out
          grep -q '"name":"toggle_flag"' /tmp/mcp.out
          grep -q '"destructiveHint":true' /tmp/mcp.out

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing @flagify/mcp version $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
